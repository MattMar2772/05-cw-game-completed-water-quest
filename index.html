<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1><img src="img/cw_logo_horizontal.png" alt="Company Logo"></h1>
    <h1>Water Quest</h1>
    
    <div id="difficulty-selection" class="difficulty-selection">
      <p class="difficulty-prompt">Select a Difficulty Level:</p>
      <div class="difficulty-buttons">
        <button id="difficulty-easy" class="difficulty-btn" data-difficulty="easy">Easy</button>
        <button id="difficulty-medium" class="difficulty-btn" data-difficulty="medium">Medium</button>
        <button id="difficulty-hard" class="difficulty-btn" data-difficulty="hard">Hard</button>
      </div>
    </div>
    
    <div id="game-container" class="game-container" style="display: none;">
      <p class="game-instructions" id="game-instructions">Collect 20 items to complete the game!</p>
      <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
        <p>Time Left: <span id="timer">30s</span></p>
      </div>
      <div id="achievements" class="achievement"></div>
      <div class="game-grid"></div>
      <button id="start-game">Start Game</button>
      <button id="stop-game">Stop Game</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-brand">
      <span>Support</span>
      <img src="img/cw_logo_horizontal.png" alt="Charity: water logo">
    </div>
    <div class="footer-links">
      <a href="https://www.charitywater.org" target="_blank" rel="noopener noreferrer">Official Website</a>
      <a href="https://www.charitywater.org/donate/the-spring" target="_blank" rel="noopener noreferrer">Donate</a>
      <a href="https://www.charitywater.org/fundraise" target="_blank" rel="noopener noreferrer">Fundraise</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
